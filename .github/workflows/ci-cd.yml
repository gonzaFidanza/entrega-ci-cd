name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BUILD - instalar dependencias
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

  # ------------------------------------------------------------------
  # JOB 2: LINT - análisis estático con ESLint
  # ------------------------------------------------------------------
  lint:
    name: Lint (Inspección de código)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Ejecutar ESLint
        run: pnpm lint

  # ------------------------------------------------------------------
  # JOB 3: TEST - pruebas automatizadas con Jest
  # ------------------------------------------------------------------
  test:
    name: Test (Pruebas automatizadas)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Ejecutar tests con cobertura
        run: pnpm test
      - name: Subir cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ------------------------------------------------------------------
  # JOB 4: DOCKER BUILD - construir y validar la imagen
  # ------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen Docker
        run: docker build -t entrega-ci-cd:${{ github.sha }} .
      - name: Verificar que la imagen arranca
        run: |
          docker run -d -p 3000:3000 --name test-container entrega-ci-cd:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container

  # ------------------------------------------------------------------
  # JOB 5: DEPLOY - despliegue a Render
  # ------------------------------------------------------------------
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_APP_URL: https://entrega-ci-cd.onrender.com
    steps:
      - name: Trigger deploy en Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Esperar a que Render termine el deploy
        run: sleep 90

      - name: Smoke test contra /health
        run: curl --fail --retry 5 --retry-delay 10 "$RENDER_APP_URL/health"

      - name: Notificar éxito
        run: echo "Deploy verificado en $RENDER_APP_URL"

  # ------------------------------------------------------------------
  # JOB 6: NOTIFICAR - mandar feedback a Discord (éxito o fallo)
  # ------------------------------------------------------------------
  notify:
    name: Notificar a Discord
    runs-on: ubuntu-latest
    needs: [build, lint, test, docker, deploy]
    if: always()  # se ejecuta siempre, haya fallado o no
    steps:
      - name: Calcular estado del pipeline
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "color=15158332" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "titulo=Pipeline FALLÓ" >> $GITHUB_OUTPUT
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "color=10070709" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "titulo=Pipeline CANCELADO" >> $GITHUB_OUTPUT
          else
            echo "color=3066993" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "titulo=Pipeline EXITOSO" >> $GITHUB_OUTPUT
          fi

      - name: Enviar mensaje a Discord
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "embeds": [{
                "title": "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.titulo }}",
                "color": ${{ steps.status.outputs.color }},
                "fields": [
                  { "name": "Repositorio", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Autor", "value": "${{ github.actor }}", "inline": true },
                  { "name": "Commit", "value": "${{ github.event.head_commit.message }}" },
                  { "name": "Ver en GitHub", "value": "[Abrir pipeline](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }]
            }' \
            "${{ secrets.DISCORD_WEBHOOK }}"