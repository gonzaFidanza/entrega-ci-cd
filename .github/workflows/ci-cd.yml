name: CI/CD Pipeline

# Disparadores: cuándo se ejecuta el pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BUILD - instalar dependencias y compilar (no hay compilación
  # en Node, pero esta etapa garantiza que el proyecto se puede armar)
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

  # ------------------------------------------------------------------
  # JOB 2: LINT - análisis estático del código con ESLint
  # ------------------------------------------------------------------
  lint:
    name: Lint (Inspección de código)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Ejecutar ESLint
        run: npm run lint

  # ------------------------------------------------------------------
  # JOB 3: TEST - ejecutar pruebas automatizadas con Jest
  # ------------------------------------------------------------------
  test:
    name: Test (Pruebas automatizadas)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Ejecutar tests con cobertura
        run: npm test
      - name: Subir cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ------------------------------------------------------------------
  # JOB 4: DOCKER BUILD - construir la imagen Docker
  # ------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen Docker
        run: docker build -t entrega-ci-cd:${{ github.sha }} .
      - name: Verificar que la imagen arranca
        run: |
          docker run -d -p 3000:3000 --name test-container entrega-ci-cd:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container

  # ------------------------------------------------------------------
  # JOB 5: DEPLOY - despliegue a Render (solo en push a main)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - name: Notificar éxito
        run: echo "Deploy disparado en Render. Verificar https://tu-app.onrender.com"
